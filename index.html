<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Content Chatbot</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="chat-container">
    <h1>🤖 AI Content Chatbot</h1>
    
    <div id="chat-box">
      <p><b>AI:</b> Hello! Welcome to your AI Content Assistant. What viral idea do you need today?</p>
    </div>

    <div style="margin-bottom: 15px;">
      <button onclick="quickPrompt('Boogeyman prompt')">Boogeyman Prompt</button>
      <button onclick="quickPrompt('Viral caption')">Viral Caption</button>
      <button onclick="quickPrompt('Market meme')">Market Meme</button>
      <button onclick="quickPrompt('Action scene')">Action Scene</button>
    </div>

    <input type="text" id="user-input" placeholder="Type your message...">
    <button id="send-btn">Send</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
