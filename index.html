<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ChatTBM - AI Content Assistant</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="app">

<header>

08AD4FA9-71D7-4B6E-BC1A-0C293EA7E5F7.png

<h1>ChatTBM</h1>

<p>Your AI Content Assistant</p>

</header>

<div id="chat-box">

<div class="message bot">
👋 Hello, I’m ChatTBM.
<br>
I can help you create captions, scripts, viral ideas, hashtags and social media content.
</div>

</div>


<div class="quick-buttons">

<button onclick="quickMessage('Create a viral caption')">
✨ Caption
</button>

<button onclick="quickMessage('Write a video script')">
🎬 Script
</button>

<button onclick="quickMessage('Give me hashtags')">
#️⃣ Hashtags
</button>

<button onclick="quickMessage('Give me viral content ideas')">
🔥 Viral Ideas
</button>

</div>



<div class="input-area">

<input id="user-input" placeholder="Ask ChatTBM anything...">

<button onclick="sendMessage()">
➤
</button>

</div>


</div>


<script src="script.js"></script>

</body>
</html>
