<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Content Chatbot</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="chat-container">
    <h1>🤖 AI Content Assistant</h1>
    <p style="color:#aaa; margin-bottom:20px;">Professional tools for viral social media content</p>
    
    <div id="chat-box">
      <p><b>AI:</b> Hello! How can I help with your content today? Photo prompts, captions, ideas, etc.</p>
    </div>

    <div style="margin: 15px 0; display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;">
      <button onclick="quickPrompt('Viral photo prompt')">Viral Photo Prompt</button>
      <button onclick="quickPrompt('Facebook caption')">Facebook Caption</button>
      <button onclick="quickPrompt('Viral hook')">Viral Hook</button>
      <button onclick="quickPrompt('Content calendar idea')">Content Calendar</button>
      <button onclick="quickPrompt('Thumbnail idea')">Thumbnail Idea</button>
      <button onclick="quickPrompt('Market meme')">Market Meme</button>
    </div>

    <input type="text" id="user-input" placeholder="Type your request...">
    <button id="send-btn">Send</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
