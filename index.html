<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ChatTBM - AI Content Assistant</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="app">

<header>

<img src="08AD4FA9-71D7-4B6E-BC1A-0C293EA7E5F7.png" class="logo">

<h1>ChatTBM</h1>

<p>Your AI Content Assistant</p>

</header>

<div id="chat-box">

<div class="welcome">

<img src="ChatTBM Logo.png" class="main-logo">

<h2>Welcome to ChatTBM</h2>

<p>
Your AI Content Assistant for captions, scripts, viral ideas and creativity.
</p>

<div class="auth-buttons">

<button class="signup" onclick="openSignup()">
Create Account
</button>

<button class="login" onclick="openLogin()">
Log In
</button>
</button>

</div>

<p class="small-text">
Join creators using AI to create better content faster.
</p>

</div>


<div class="quick-buttons">

<button onclick="quickMessage('Create a viral caption')">
✨ Caption
</button>

<button onclick="quickMessage('Write a video script')">
🎬 Script
</button>

<button onclick="quickMessage('Give me hashtags')">
#️⃣ Hashtags
</button>

<button onclick="quickMessage('Give me viral content ideas')">
🔥 Viral Ideas
</button>

</div>



<div class="input-area">

<input id="user-input" placeholder="Ask ChatTBM anything...">

<button onclick="sendMessage()">
➤
</button>

</div>


</div>


<script src="script.js"></script>

</body>
</html>
